on_http_request:
  # 1. Enforce Bearer token
  - actions:
    - type: deny
      config:
        status_code: 401
    expressions:
      - "!('authorization' in req.headers && req.headers['authorization'][0] == 'Bearer something')"

  # 2. Enforce IP allowlist
  - actions:
    - type: restrict-ips
      config:
        enforce: true
        allow:
          - 0.0.0.0/32

