name: DevPod

# Reusable. Called by check.yaml on pull requests, and by base.yaml as the gate
# in front of the GHCR push, so a commit that cannot `devpod up` is never
# published. Can also be run on its own from the Actions tab.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Built and validated on the runner only; never pushed.
  IMAGE: dev:ci
  # loft-sh currently only tags prereleases, so the `latest` download URL still
  # resolves to the stale v0.6.15. Pin explicitly and bump deliberately.
  DEVPOD_VERSION: v0.7.0-alpha.34

jobs:
  devpod:
    name: devpod up (${{ matrix.variant }}, linux/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      # The legs fail for unrelated reasons, so let all of them report.
      fail-fast: false
      matrix:
        # Both architectures of the published manifest, on native runners:
        # emulating an arm64 `mise install` under QEMU would take far longer
        # than it takes to boot a real arm64 runner. Free for public repos.
        arch: [amd64, arm64]
        # default: the image as shipped.
        # devenv:  INSTALL_DEVENV=true via remoteEnv, so post-create.sh also
        #          installs single-user Nix and devenv. Slower, and the only
        #          coverage the optional components get.
        variant: [default, devenv]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Single-platform and `load`ed, because a multi-arch manifest cannot be
      # imported into the runner's docker. Each arch caches under its own scope;
      # base.yaml's push reads both, so it builds neither from scratch.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./base/Dockerfile
          platforms: linux/${{ matrix.arch }}
          load: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Install DevPod
        run: |
          sudo curl -fsSL -o /usr/local/bin/devpod \
            "https://github.com/loft-sh/devpod/releases/download/${DEVPOD_VERSION}/devpod-linux-${{ matrix.arch }}"
          sudo chmod +x /usr/local/bin/devpod
          devpod version

      # `provider add` exits 1 if the provider is already configured (it is not
      # idempotent), which a hosted runner never hits but a reused ~/.devpod
      # would. `provider use` is idempotent, so fall back to it.
      - name: Add docker provider
        run: devpod provider add docker || devpod provider use docker

      # Brings up a throwaway workspace on the image, runs post-create.sh, and
      # asserts the toolchain works. See scripts/validate-devpod.sh.
      - name: Validate devpod up
        env:
          # Asserted inside the container, so a mis-wired matrix cannot pass by
          # validating the wrong architecture.
          EXPECT_ARCH: ${{ matrix.arch }}
        run: scripts/validate-devpod.sh "${IMAGE}" "${{ matrix.variant }}"
