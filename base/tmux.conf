# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g extended-keys on

# UX
set -g mouse on
set -s escape-time 0
set -g history-limit 100000
set -g focus-events on

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Copy mode
setw -g mode-keys vi

# UI
# ----- status bar base -----
set -g status on
set -g status-interval 5

# background + foreground (modern dark)
set -g status-style bg=#1e1e2e,fg=#cdd6f4

# left / right sections
set -g status-left "#[fg=#89b4fa]#S "
set -g status-right "#[fg=#a6e3a1]%Y-%m-%d %H:%M "

# ----- window tabs -----
set -g window-status-style bg=#1e1e2e,fg=#6c7086
set -g window-status-current-style bg=#313244,fg=#cdd6f4,bold

# format of tabs
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# ----- pane border -----
set -g pane-border-style fg=#45475a
set -g pane-active-border-style fg=#89b4fa
